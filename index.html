<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éditeur ABC - 100% Local (Corrigé)</title>
    <style>
        :root { --primary: #4CAF50; --bg: #f4f4f9; --code-bg: #1e1e1e; --code-text: #d4d4d4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: white; padding: 10px 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        h1 { margin: 0; font-size: 1.2rem; color: #333; }
        .btn { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-left: 10px; font-size: 0.9rem; transition: background 0.2s; }
        .btn:hover { background: #45a049; }
        
        .main-container { display: flex; flex: 1; height: calc(100vh - 60px); overflow: hidden; }
        
        .sidebar { width: 250px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 12px 15px; background: #f8f9fa; font-weight: 600; font-size: 0.9rem; border-bottom: 1px solid #eee; color: #555; }
        #piece-list { flex: 1; overflow-y: auto; list-style: none; padding: 0; margin: 0; }
        #piece-list li { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #444; transition: background 0.1s; }
        #piece-list li:hover { background: #f1f1f1; }
        #piece-list li.active { background: #e8f5e9; border-left: 4px solid var(--primary); font-weight: 600; color: #2e7d32; }
        
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
        
        .score-area { flex: 1; padding: 20px; overflow: auto; background: white; display: flex; justify-content: center; align-items: flex-start; border-bottom: 1px solid #ddd; position: relative; }
        #abc-visual { width: 100%; max-width: 1000px; min-height: 200px; }
        .empty-state { color: #999; text-align: center; margin-top: 60px; font-style: italic; font-size: 1.1rem; }
        
        .code-area { height: 40%; border-top: 1px solid #ccc; display: flex; flex-direction: column; background: var(--code-bg); flex-shrink: 0; }
        .code-header { padding: 8px 15px; background: #252526; color: #ccc; font-size: 0.85rem; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        #abc-code { flex: 1; background: var(--code-bg); color: var(--code-text); border: none; padding: 15px; font-family: 'Consolas', 'Monaco', monospace; font-size: 1rem; resize: none; outline: none; line-height: 1.5; width: 100%; box-sizing: border-box; white-space: pre; }
        #abc-code:focus { background: #2a2a2a; }
        
        .status-msg { font-size: 0.85rem; font-weight: 500; }
        .status-ok { color: #81c784; }
        .status-err { color: #e57373; }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .sidebar { width: 100%; height: 180px; order: 2; }
            .content { height: calc(100% - 180px); order: 1; }
            .code-area { height: 35%; }
        }
    </style>
</head>
<body>

<header>
    <h1>🎵 Éditeur ABC (Local)</h1>
    <div>
        <button class="btn" onclick="document.getElementById('file-input').click()">📂 Ouvrir .abc</button>
        <button class="btn" onclick="saveFile()">💾 Sauvegarder</button>
        <input type="file" id="file-input" accept=".abc,.txt" style="display: none;" onchange="loadFile(this)">
    </div>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="sidebar-header">Morceaux</div>
        <ul id="piece-list"></ul>
    </div>

    <div class="content">
        <div class="score-area">
            <div id="abc-visual">
                <div class="empty-state">Sélectionnez un morceau à gauche</div>
            </div>
        </div>

        <div class="code-area">
            <div class="code-header">
                <span>Code ABC</span>
                <span id="status-msg" class="status-msg">Prêt</span>
            </div>
            <textarea id="abc-code" placeholder="Le code apparaîtra ici..."></textarea>
        </div>
    </div>
</div>

<script>
    let allPieces = [];
    let currentPieceIndex = -1;

    function loadFile(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            parsePieces(e.target.result);
            if (allPieces.length > 0) {
                selectPiece(0);
            } else {
                alert("Aucun morceau trouvé (cherchez les lignes 'X:').");
            }
            input.value = '';
        };
        reader.readAsText(file);
    }

    function saveFile() {
        if (allPieces.length === 0) return alert("Rien à sauvegarder.");
        
        // Mettre à jour le morceau actuel avant de sauvegarder
        if (currentPieceIndex >= 0) {
            allPieces[currentPieceIndex].content = document.getElementById('abc-code').value;
        }

        let fullContent = "";
        allPieces.forEach(p => {
            fullContent += "X:" + p.num + "\n" + p.content + "\n\n";
        });

        const blob = new Blob([fullContent], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "partition.abc";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function parsePieces(content) {
        allPieces = [];
        const list = document.getElementById('piece-list');
        list.innerHTML = '';

        // Regex robuste pour séparer les morceaux
        const regex = /X:(\d+)\s*([\s\S]*?)(?=X:\d+|$)/g;
        let match;
        let index = 0;

        while ((match = regex.exec(content)) !== null) {
            const num = match[1];
            const block = match[2].trim();
            
            const titleMatch = block.match(/T:(.+?)(?:\n|$)/i);
            const title = titleMatch ? titleMatch[1].trim() : `Sans titre ${num}`;
            
            const compMatch = block.match(/C:(.+?)(?:\n|$)/i);
            const comp = compMatch ? compMatch[1].trim() : '';

            allPieces.push({ num, title, comp, content: block });

            const li = document.createElement('li');
            li.textContent = `${num}. ${title}`;
            li.onclick = () => selectPiece(index); // Binding explicite
            li.dataset.index = index;
            list.appendChild(li);
            index++;
        }
        updateStatus(`${allPieces.length} morceau(x)`, 'ok');
    }

    // --- FONCTION CRITIQUE CORRIGÉE ---
    function selectPiece(index) {
        if (index < 0 || index >= allPieces.length) return;
        
        // 1. Mise à jour de l'index global
        currentPieceIndex = index;
        const piece = allPieces[index];
        
        // 2. Mise à jour visuelle de la liste
        const listItems = document.getElementById('piece-list').children;
        for (let item of listItems) item.classList.remove('active');
        if(listItems[index]) listItems[index].classList.add('active');

        // 3. Mise à jour du texte dans l'éditeur
        const codeArea = document.getElementById('abc-code');
        codeArea.value = piece.content;
        
        // 4. FORCE LE DESSIN IMMÉDIAT avec le contenu du morceau sélectionné
        // On ne se fie pas à l'événement 'input' qui pourrait ne pas se déclencher ici
        renderScore(piece.content);
    }

    // Écouteur pour la saisie manuelle (mise à jour en temps réel)
    document.getElementById('abc-code').addEventListener('input', (e) => {
        if (currentPieceIndex >= 0) {
            // Mettre à jour la donnée en mémoire
            allPieces[currentPieceIndex].content = e.target.value;
            // Redessiner
            renderScore(e.target.value);
        }
    });

    function updateStatus(msg, type) {
        const el = document.getElementById('status-msg');
        el.textContent = msg;
        el.className = `status-msg status-${type}`;
    }

    // --- MOTEUR DE DESSIN (Inchangé, fonctionne bien) ---
    function renderScore(abc) {
        const container = document.getElementById('abc-visual');
        container.innerHTML = '';
        
        if (!abc || !abc.trim()) {
            container.innerHTML = '<div class="empty-state">Ce morceau est vide ou ne contient pas de notes.</div>';
            return;
        }

        // Analyse en-têtes
        let musicString = "";
        const lines = abc.split('\n');
        let musicStarted = false;
        
        for (let line of lines) {
            const trimLine = line.trim();
            if (!trimLine || trimLine.startsWith('%')) continue;
            
            // Si on trouve une ligne de musique (contient des notes)
            if (trimLine.match(/[A-Ga-gz]/)) {
                musicStarted = true;
            }
            
            if (musicStarted || trimLine.match(/[A-Ga-gz|]/)) {
                // Ignorer les commentaires en fin de ligne
                const cleanLine = trimLine.split('%')[0];
                musicString += cleanLine + " ";
            }
        }

        if (!musicString.trim()) {
            container.innerHTML = '<div class="empty-state">Aucune note détectée dans ce morceau.</div>';
            return;
        }

        // Création SVG
        const svgWidth = 800;
        const svgHeight = 250;
        const marginX = 60;
        const topLineY = 100; 
        
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("width", "100%");
        svg.setAttribute("height", svgHeight);
        svg.setAttribute("viewBox", `0 0 ${svgWidth} ${svgHeight}`);
        svg.style.background = "#fff";
        svg.style.boxShadow = "0 2px 10px rgba(0,0,0,0.05)";

        // Portée
        for (let i = 0; i < 5; i++) {
            const y = topLineY + (i * 10);
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", marginX - 10);
            line.setAttribute("y1", y);
            line.setAttribute("x2", svgWidth - 20);
            line.setAttribute("y2", y);
            line.setAttribute("stroke", "#000");
            line.setAttribute("stroke-width", "1.2");
            svg.appendChild(line);
        }

        // Clé de Sol
        const clefGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
        clefGroup.setAttribute("transform", `translate(${marginX - 40}, 65) scale(0.035)`);
        const clefPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
        clefPath.setAttribute("d", "M 115 150 C 115 150 115 350 230 350 C 310 350 310 250 230 250 C 180 250 160 280 160 310 C 160 380 230 420 280 420 C 360 420 400 350 400 250 C 400 100 300 -50 180 -50 C 100 -50 50 20 50 100 C 50 250 150 450 300 450 C 450 450 520 300 520 250 L 480 250 C 480 280 450 350 350 350 C 250 350 200 250 200 150 C 200 80 240 50 280 50 C 320 50 350 80 350 150 C 350 250 300 350 200 350 C 120 350 115 250 115 150 Z");
        clefPath.setAttribute("fill", "#000");
        clefGroup.appendChild(clefPath);
        svg.appendChild(clefGroup);

        // Notes
        const noteMap = { 'C': -6, 'D': -5, 'E': -4, 'F': -3, 'G': -2, 'A': -1, 'B': 0, 'c': 1, 'd': 2, 'e': 3, 'f': 4, 'g': 5, 'a': 6, 'b': 7 };
        let currentX = marginX + 20;
        const maxLineWidth = svgWidth - 40;
        const startX = currentX;

        const tokens = musicString.match(/([A-Ga-gz][\^_=]?[',]*[0-9]*|[:|])/g);
        if (!tokens) return;

        tokens.forEach(token => {
            if (token === '|') {
                const bar = document.createElementNS("http://www.w3.org/2000/svg", "line");
                bar.setAttribute("x1", currentX - 5); bar.setAttribute("y1", topLineY - 5);
                bar.setAttribute("x2", currentX - 5); bar.setAttribute("y2", topLineY + 45);
                bar.setAttribute("stroke", "#000"); bar.setAttribute("stroke-width", "2");
                svg.appendChild(bar);
                currentX += 10;
                return;
            }
            if (token === ':') return;

            let pitchChar = token[0];
            let accidental = '';
            let octaveModifier = '';
            let i = 1;
            
            if (i < token.length && ['^', '_', '='].includes(token[i])) { accidental = token[i]; i++; }
            while (i < token.length && (token[i] === "'" || token[i] === ',')) { octaveModifier += token[i]; i++; }

            let basePos = noteMap[pitchChar] || 0;
            if (octaveModifier) {
                for (let char of octaveModifier) {
                    if (char === "'") basePos += 7;
                    if (char === ",") basePos -= 7;
                }
            }
            
            const noteY = (topLineY + 20) - (basePos * 5);

            if (pitchChar.toLowerCase() !== 'z') {
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const head = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
                head.setAttribute("cx", currentX); head.setAttribute("cy", noteY);
                head.setAttribute("rx", "6"); head.setAttribute("ry", "4.5");
                head.setAttribute("fill", "#000");
                head.setAttribute("transform", `rotate(-15, ${currentX}, ${noteY})`);
                g.appendChild(head);

                const stemUp = noteY > (topLineY + 20);
                const stemX = stemUp ? currentX + 5 : currentX - 5;
                const stemY = stemUp ? noteY - 35 : noteY + 35;
                const stem = document.createElementNS("http://www.w3.org/2000/svg", "line");
                stem.setAttribute("x1", stemX); stem.setAttribute("y1", noteY);
                stem.setAttribute("x2", stemX); stem.setAttribute("y2", stemY);
                stem.setAttribute("stroke", "#000"); stem.setAttribute("stroke-width", "1.5");
                g.appendChild(stem);

                if (accidental === '^') {
                    const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    txt.setAttribute("x", currentX - 12); txt.setAttribute("y", noteY + 4);
                    txt.setAttribute("font-size", "14"); txt.setAttribute("font-weight", "bold");
                    txt.textContent = "#";
                    g.appendChild(txt);
                }
                svg.appendChild(g);
            }
            currentX += 35;
            if (currentX > maxLineWidth) currentX = startX;
        });

        container.appendChild(svg);
    }

    // Initialisation
    window.onload = () => {
        const demo = `X:1\nT:Morceau 1\nM:4/4\nL:1/4\nK:C\nC D E C | E F E2 |\nX:2\nT:Morceau 2\nM:3/4\nL:1/8\nK:G\nG2 A2 B2 | d4 c2 |`;
        document.getElementById('abc-code').value = demo;
        parsePieces(demo);
        if(allPieces.length > 0) selectPiece(0);
    };
</script>

</body>
</html>
